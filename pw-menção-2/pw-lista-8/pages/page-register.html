<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Curso de Manutenção</title>
    <link rel="stylesheet" href="../css/style-register.css">
</head>
<body>

    <div class="container">
        
        <header class="main-header">
            <div class="logo">
                <img src="/assets/logo.png" alt="">
            </div>
            <nav class="nav-menu">
                <a href="/pages/page-home.html">Smartphones</a>
                <a href="#">Tablets</a>
                <a href="#">Computadores</a>
            </nav>
            <div class="auth-buttons">
                <a href="/pages/page-login.html" class="btn-login">Login</a>
                <a href="/pages/page-register.html" class="btn-registro active">Registrar</a>
            </div>
        </header>

        <div class="register-wrapper">
            
            <main class="register-box">
                <h1>REGISTRAR</h1>
                
                <form action="#" method="POST" class="register-form">
                    
                    <div class="form-group">
                        <label for="name">Nome</label>
                        <input type="text" id="name" name="name" placeholder="Nome" required>
                        <span class="field-info">Obrigatório</span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Email" required>
                        <span class="field-info">Obrigatório</span>
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" placeholder="senha" required>
                        <span class="field-info">Obrigatório</span>
                    </div>

                    <div class="form-group">
                        <label for="country" class="bold-label">País de Nascimento</label>
                        <select id="country" name="country" required>
                            <option value="" disabled selected>Selecione um</option>
                            <option value="br">Brasil</option>
                            <option value="ar">Argentina</option>
                            <option value="cl">Chile</option>
                        </select>
                        <span class="field-info">Obrigatorio.</span>
                    </div>

                    <div class="form-group-custom">
                        <label class="bold-label">Genero</label>
                        <div class="radio-group">
                            <label><input type="checkbox" name="gender" value="masculino" class="radio-mock"> Masculino</label>
                            <label><input type="checkbox" name="gender" value="feminino" class="radio-mock"> Feminino</label>
                            <label><input type="checkbox" name="gender" value="indefinido" class="radio-mock"> Prefiro não dizer.</label>
                        </div>
                    </div>

                    <div class="form-group-custom">
                        <label class="bold-label">Hobbies</label>
                        <div class="checkbox-grid">
                            <label><input type="checkbox" name="hobbies[]" value="hobby1" checked> Guitarra</label>
                            <label><input type="checkbox" name="hobbies[]" value="hobby2">Futebol</label>
                            <label><input type="checkbox" name="hobbies[]" value="hobby3">Tenis</label>
                            <label><input type="checkbox" name="hobbies[]" value="hobby4">Programacao</label>
                        </div>
                    </div>

                    <div class="form-group-custom">
                        <label class="bold-label" for="comments">Comentários</label>
                        <textarea id="comments" name="comments" rows="5"></textarea>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" name="terms" required>
                            Aceito os termos e condições.
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-action btn-submit">Registrar</button>
                        <button type="button" class="btn-action btn-cancel" onclick="window.history.back();">Cancelar</button>
                    </div>
                    
                </form>
            </main>

        </div>
    </div>

</body>
</html>
