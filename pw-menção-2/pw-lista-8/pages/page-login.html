<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Curso de Manutenção</title>
    <link rel="stylesheet" href="../css/style-page-login.css">
</head>
<body>

    <div class="container">
        
        <header class="main-header">
            <div class="logo">
                <img src="/assets/logo.png" alt="">
            </div>
            <nav class="nav-menu">
                <a href="../index.html">Smartphones</a>
                <a href="#">Tablets</a>
                <a href="#">Computadores</a>
            </nav>
            <div class="auth-buttons">
                <a href="/pages/page-login.html" class="btn-login active">Login</a>
                <a href="/pages/page-register.html" class="btn-registro">Registro</a>
            </div>
        </header>

        <div class="login-wrapper">
            
            <main class="login-box">
                <h1>BEM-VINDO</h1>
                
                <form action="#" method="POST" class="login-form">
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="email@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" placeholder="senha" required>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" name="remember">
                            <span class="checkmark"></span>
                            Lembrar de mim
                        </label>
                    </div>

                    <p class="error-message">
                        A combinação de email e senha não é válida..
                    </p>

                    <button type="submit" class="btn-submit">Entrar</button>
                    
                </form>
            </main>

        </div>
    </div>

</body>
</html>
